apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:

    metadata:
      labels:
        app: backend

    spec:

      serviceAccountName: {{ .Values.backend.serviceAccount.name }}

      containers:
      - name: backend

        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"

        ports:
        - containerPort: 8084

        envFrom:
        - configMapRef:
            name: backend-config

        - secretRef:
            name: backend-secret
