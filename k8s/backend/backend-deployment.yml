apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:

    metadata:
      labels:
        app: backend

    spec:

      serviceAccountName: backend-sa

      containers:
      - name: backend

        image: 666607745270.dkr.ecr.ap-southeast-2.amazonaws.com/careercrafter-backend:latest

        ports:
        - containerPort: 8084

        envFrom:
        - configMapRef:
            name: backend-config

        - secretRef:
            name: backend-secret