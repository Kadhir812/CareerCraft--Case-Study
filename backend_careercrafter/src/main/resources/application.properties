spring.application.name=backend_careercrafter
spring.config.import=optional:file:backend_careercrafter/.env[.properties],optional:file:.env[.properties]

# Server configuration
server.port=8084

# Database configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT configuration
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}

# AWS S3 configuration
aws.region=${AWS_REGION}
aws.s3.bucket=${S3_BUCKET}
aws.s3.presign-duration-minutes=${S3_PRESIGN_DURATION_MINUTES:10}

